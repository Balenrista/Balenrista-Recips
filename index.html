<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balenrista - Order System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #0A0A0A; color: #B7B4AE; }
    .loader { display: flex; gap: 8px; margin-bottom: 15px; }
    .leaf { width: 15px; height: 15px; background-color: #726E68; border-radius: 50% 0 50% 50%; animation: spin 1.5s linear infinite; }
    .leaf:nth-child(2) { animation-delay: 0.2s; }
    .leaf:nth-child(3) { animation-delay: 0.4s; }
    @keyframes spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.2); background-color: #B7B4AE; } 100% { transform: rotate(360deg) scale(1); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #33312F; border-radius: 3px; }
    .tab-btn { transition: all 0.3s ease; }
    .tab-btn.active { background-color: #33312F; color: #fff; border-color: #726E68; }
  </style>
</head>
<body class="p-4 md:p-6 pb-12">

  <div id="loading" class="fixed inset-0 bg-[#0A0A0A]/90 z-[999] flex flex-col items-center justify-center backdrop-blur-sm" style="display: none;">
    <div class="loader">
      <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
    </div>
    <p class="text-[#726E68] font-bold tracking-widest text-sm animate-pulse" id="loading-text">SYNCING DATA...</p>
  </div>

  <div class="max-w-xl mx-auto space-y-6">
    
    <div class="flex items-center justify-center mb-6 mt-4">
      <h1 class="text-2xl font-bold text-white tracking-widest flex items-center gap-2">
        <i class="ph-fill ph-coffee text-[#726E68]"></i> BALENRISTA
      </h1>
    </div>

    <div class="flex space-x-2 bg-[#1A1A1A] p-1.5 rounded-xl border border-[#33312F]">
      <button class="tab-btn active flex-1 py-3 rounded-lg text-sm font-medium text-[#726E68] flex flex-col items-center gap-1" onclick="openTab(event, 'OrderTab')">
        <i class="ph-bold ph-receipt text-xl"></i> รับออเดอร์
      </button>
      <button class="tab-btn flex-1 py-3 rounded-lg text-sm font-medium text-[#726E68] flex flex-col items-center gap-1" onclick="openTab(event, 'PrintTab')">
        <i class="ph-bold ph-printer text-xl"></i> ปริ้นท์ PDF
      </button>
      <button class="tab-btn flex-1 py-3 rounded-lg text-sm font-medium text-[#726E68] flex flex-col items-center gap-1" onclick="openTab(event, 'CustomerTab')">
        <i class="ph-bold ph-users text-xl"></i> ฐานลูกค้า
      </button>
    </div>

    <div id="OrderTab" class="tabcontent space-y-4" style="display:block;">
      <div class="bg-[#1A1A1A] border border-[#33312F] rounded-2xl p-5 space-y-4 shadow-lg">
        <div class="flex items-center gap-2 mb-2">
          <i class="ph-bold ph-file-text text-[#726E68]"></i>
          <h3 class="text-white font-medium">ข้อมูลบิลหลัก</h3>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="oDoc" class="col-span-2 bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-[#B7B4AE] focus:border-[#726E68] outline-none" placeholder="เลขที่เอกสาร">
          <input type="date" id="oDate" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-[#B7B4AE] focus:border-[#726E68] outline-none">
          <select id="oCustomer" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-[#B7B4AE] focus:border-[#726E68] outline-none">
            <option value="">-- ลูกค้าทั่วไป --</option>
          </select>
        </div>
      </div>

      <div class="bg-[#1A1A1A] border border-[#33312F] rounded-2xl p-5 space-y-4 shadow-lg">
        <div class="flex items-center gap-2 mb-2">
          <i class="ph-bold ph-coffee text-[#726E68]"></i>
          <h3 class="text-white font-medium">รายการเมนู</h3>
        </div>
        <select id="oMenu" onchange="autoFillPrice()" class="w-full bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white focus:border-[#726E68] outline-none mb-3">
          <option value="">-- เลือกเมนู --</option>
        </select>
        <div class="grid grid-cols-3 gap-3">
          <div class="relative">
             <span class="absolute top-[-10px] left-3 bg-[#1A1A1A] px-1 text-xs text-[#726E68]">จำนวน</span>
             <input type="number" id="oQty" oninput="calcTotal()" class="w-full bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white text-center focus:outline-none">
          </div>
          <div class="relative">
             <span class="absolute top-[-10px] left-3 bg-[#1A1A1A] px-1 text-xs text-[#726E68]">ราคา/หน่วย</span>
             <input type="number" id="oPrice" oninput="calcTotal()" class="w-full bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white text-center focus:outline-none">
          </div>
          <div class="relative">
             <span class="absolute top-[-10px] left-3 bg-[#1A1A1A] px-1 text-xs text-[#726E68]">รวม</span>
             <input type="number" id="oTotal" readonly class="w-full bg-[#33312F]/50 border border-[#33312F] rounded-lg p-3 text-green-400 text-center font-bold">
          </div>
        </div>
        <button onclick="addItem()" class="w-full mt-3 bg-[#33312F] hover:bg-[#4a4744] text-white py-3 rounded-lg font-medium flex items-center justify-center gap-2 transition duration-300">
          <i class="ph-bold ph-plus-circle text-lg"></i> เพิ่มลงตะกร้า
        </button>
      </div>

      <div class="bg-[#1A1A1A] border border-[#33312F] rounded-2xl p-5 shadow-lg">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-[#33312F] text-[#726E68] text-sm">
              <th class="pb-3 font-medium w-1/2">รายการ</th>
              <th class="pb-3 font-medium text-center">จำนวน</th>
              <th class="pb-3 font-medium text-right">รวม (฿)</th>
              <th class="pb-3 font-medium text-center"></th>
            </tr>
          </thead>
          <tbody id="itemTbody" class="text-sm text-white divide-y divide-[#33312F]/50"></tbody>
        </table>
        <div class="mt-4 pt-4 border-t border-[#726E68]/30 flex justify-between items-center text-white">
          <span class="font-medium text-[#726E68]">ยอดรวมทั้งสิ้น</span>
          <span class="text-2xl font-bold text-green-400">฿<span id="grandTotal">0.00</span></span>
        </div>
      </div>

      <button id="btnSaveOrder" onclick="saveOrder()" class="w-full bg-[#371E1E] hover:bg-[#5a2e2e] text-white py-4 rounded-xl font-bold tracking-wide flex items-center justify-center gap-2 shadow-lg mt-4 transition duration-300">
        <i class="ph-bold ph-floppy-disk text-xl"></i> บันทึกออเดอร์ลงระบบ
      </button>
    </div>

    <div id="PrintTab" class="tabcontent space-y-4" style="display:none;">
      <div class="bg-[#1A1A1A] border border-[#33312F] rounded-2xl p-5 space-y-5 shadow-lg">
        <div class="flex items-center gap-2 mb-2">
          <i class="ph-bold ph-printer text-[#726E68]"></i>
          <h3 class="text-white font-medium">จัดการเอกสาร & อีเมล</h3>
        </div>
        <div>
          <label class="text-xs text-[#726E68] ml-1">เลขที่เอกสาร</label>
          <input type="text" id="pdfDocNo" placeholder="เช่น BA260708-..." class="w-full bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white focus:border-[#726E68] outline-none mt-1">
          <input type="hidden" id="pdfRowNum" value="">
        </div>
        <div>
          <label class="text-xs text-[#726E68] ml-1">ส่งไปที่อีเมล</label>
          <input type="email" id="pdfEmail" placeholder="email@example.com" class="w-full bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white focus:border-[#726E68] outline-none mt-1">
        </div>
        
        <div class="grid grid-cols-2 gap-3 pt-1">
          <button id="btnPrintOnly" onclick="triggerPDF(false)" class="bg-[#33312F] hover:bg-[#4a4744] text-white py-4 rounded-xl font-bold tracking-wide transition duration-300 flex items-center justify-center gap-2 shadow-md">
            <i class="ph-bold ph-printer text-xl"></i> Print PDF
          </button>
          <button id="btnEmailOnly" onclick="triggerPDF(true)" class="bg-[#371E1E] hover:bg-[#5a2e2e] text-white py-4 rounded-xl font-bold tracking-wide transition duration-300 flex items-center justify-center gap-2 shadow-md">
            <i class="ph-bold ph-paper-plane-tilt text-xl"></i> Send Email
          </button>
        </div>

        <hr class="border-[#33312F] my-4">
        <div class="flex items-center justify-between mt-4">
          <h3 class="text-white font-medium text-sm tracking-wider">ORDER LIST STATUS</h3>
          <button onclick="loadOrderList()" class="bg-[#33312F] hover:bg-[#726E68] text-white px-3 py-1.5 rounded-lg text-xs flex items-center gap-1 transition">
            <i class="ph-bold ph-arrows-clockwise"></i> Refresh
          </button>
        </div>
        <div id="orderList" class="mt-2 space-y-2 max-h-60 overflow-y-auto custom-scrollbar pr-1"></div>
      </div>
    </div>

    <div id="CustomerTab" class="tabcontent space-y-4" style="display:none;">
      <div class="bg-[#1A1A1A] border border-[#33312F] rounded-2xl p-5 space-y-4 shadow-lg">
         <div class="flex items-center gap-2 mb-4">
          <i class="ph-bold ph-users text-[#726E68]"></i>
          <h3 class="text-white font-medium">เพิ่มฐานข้อมูลลูกค้า</h3>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <input type="text" id="cId" placeholder="รหัสลูกค้า" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white outline-none focus:border-[#726E68]">
          <input type="text" id="cName" placeholder="ชื่อลูกค้า/บริษัท" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white outline-none focus:border-[#726E68]">
          <input type="text" id="cAddress" placeholder="ที่อยู่" class="col-span-2 bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white outline-none focus:border-[#726E68]">
          <input type="text" id="cTax" placeholder="เลขผู้เสียภาษี" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white outline-none focus:border-[#726E68]">
          
          <div class="flex bg-[#0A0A0A] p-1 rounded-lg border border-[#33312F] w-full items-center">
            <button type="button" id="btnTypePerson" onclick="setCustomerType('นามบุคคล')" class="flex-1 py-2.5 rounded-md text-xs font-medium bg-[#33312F] text-white border border-[#726E68] transition duration-300">นามบุคคล</button>
            <button type="button" id="btnTypeCompany" onclick="setCustomerType('นามบริษัท')" class="flex-1 py-2.5 rounded-md text-xs font-medium text-[#726E68] transition duration-300">นามบริษัท</button>
          </div>
          <input type="hidden" id="cType" value="นามบุคคล">

          <input type="email" id="cEmail" placeholder="Email" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white outline-none focus:border-[#726E68]">
          <input type="tel" id="cPhone" placeholder="เบอร์โทรศัพท์" class="bg-[#0A0A0A] border border-[#33312F] rounded-lg p-3 text-white outline-none focus:border-[#726E68]">
        </div>

        <button id="btnCustomer" onclick="saveCustomer()" class="w-full bg-[#33312F] hover:bg-[#726E68] text-white py-4 rounded-xl font-bold tracking-wide flex items-center justify-center gap-2 mt-2 transition duration-300">
          <i class="ph-bold ph-floppy-disk text-xl"></i> บันทึกลูกค้าใหม่
        </button>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwraoxs7SfEDLKDg7SL0LVetvCltS9YsrEcg2ns7POnZvoOZVcejRTQEFNu-nKTfPs_/exec"; 
    
    let menuDataList = [];
    let currentItems = [];

    function setLoading(show, text = "LOADING...") {
      const loadingScreen = document.getElementById("loading");
      const loadingText = document.getElementById("loading-text");
      if (loadingScreen) loadingScreen.style.display = show ? "flex" : "none";
      if (loadingText) loadingText.innerText = text;
    }

    function openTab(evt, tabName) {
      document.querySelectorAll(".tabcontent").forEach(el => el.style.display = "none");
      document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
      document.getElementById(tabName).style.display = "block";
      evt.currentTarget.classList.add("active");
      
      if (tabName === 'PrintTab') {
        loadOrderList();
      }
    }

    function autoGenerateBillAndDate() {
      let now = new Date();
      let yy = now.getFullYear().toString().slice(-2);
      let mm = String(now.getMonth() + 1).padStart(2, '0');
      let dd = String(now.getDate()).padStart(2, '0');
      let hh = String(now.getHours()).padStart(2, '0');
      let min = String(now.getMinutes()).padStart(2, '0');
      let sec = String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById("oDoc").value = `BA${yy}${mm}${dd}-${hh}${min}${sec}`;
      document.getElementById("oDate").value = `${now.getFullYear()}-${mm}-${dd}`;
    }

    window.onload = function() {
      autoGenerateBillAndDate();
      setLoading(true, "FETCHING DATA... (1/2)");

      fetch(API_URL + "?action=getDropdowns")
      .then(res => res.json())
      .then(data => {
        let custSelect = document.getElementById("oCustomer");
        if(data.customers) {
          data.customers.forEach(c => custSelect.innerHTML += `<option value="${c}">${c}</option>`);
        }
        let menuSelect = document.getElementById("oMenu");
        if(data.menus) {
          menuDataList = data.menus;
          data.menus.forEach(m => menuSelect.innerHTML += `<option value="${m.name}">${m.name}</option>`);
        }
      })
      .catch(err => console.error("Error loading dropdowns:", err))
      .finally(() => setLoading(false));
    };

    function autoFillPrice() {
      let selected = document.getElementById("oMenu").value;
      let menuObj = menuDataList.find(m => m.name === selected);
      if(menuObj) {
        document.getElementById("oPrice").value = menuObj.price;
        calcTotal();
      }
    }

    function calcTotal() {
      let p = parseFloat(document.getElementById("oPrice").value) || 0;
      let q = parseFloat(document.getElementById("oQty").value) || 0;
      document.getElementById("oTotal").value = p * q;
    }

    function addItem() {
      let menu = document.getElementById("oMenu").value;
      let qty = document.getElementById("oQty").value;
      let price = document.getElementById("oPrice").value;
      let total = document.getElementById("oTotal").value;
      if(!menu || !qty) return alert("กรุณาเลือกเมนูและใส่จำนวนครับ");

      currentItems.push({ menu, qty, price, total });
      renderTable();
      
      document.getElementById("oMenu").value = "";
      document.getElementById("oQty").value = "";
      document.getElementById("oPrice").value = "";
      document.getElementById("oTotal").value = "";
    }

    function renderTable() {
      let tbody = document.getElementById("itemTbody");
      tbody.innerHTML = "";
      let grandTotal = 0;
      
      currentItems.forEach((item, index) => {
        grandTotal += parseFloat(item.total) || 0;
        tbody.innerHTML += `
          <tr class="hover:bg-[#33312F]/30 transition">
            <td class="py-3">${item.menu}</td>
            <td class="py-3 text-center">${item.qty}</td>
            <td class="py-3 text-right">${item.total}</td>
            <td class="py-3 text-center">
              <button onclick="currentItems.splice(${index}, 1); renderTable();" class="text-red-400 hover:text-red-500 transition">
                <i class="ph-bold ph-trash text-lg"></i>
              </button>
            </td>
          </tr>`;
      });
      document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
    }

    function sendToAPI(payload, loadingText, callback) {
      setLoading(true, loadingText);
      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      })
      .then(res => res.text())
      .then(text => {
        alert(text);
        if(callback) callback();
      }).catch(err => {
        alert("เกิดข้อผิดพลาด: " + err);
      }).finally(() => setLoading(false));
    }

    function saveOrder() {
      let payload = {
        action: "saveOrder",
        doc: document.getElementById("oDoc").value, 
        date: document.getElementById("oDate").value,
        customer: document.getElementById("oCustomer").value, 
        items: currentItems
      };
      
      if(!payload.doc || currentItems.length === 0) return alert("ระบุเลขที่เอกสารและเพิ่มเมนูอย่างน้อย 1 รายการครับ");
      
      sendToAPI(payload, "SAVING ORDER...", () => {
        currentItems = []; 
        renderTable(); 
        autoGenerateBillAndDate();
        document.getElementById("oCustomer").value = ""; 
      });
    }

        function triggerPDF(isEmailAction) {
      let docNo = document.getElementById("pdfDocNo").value;
      let email = document.getElementById("pdfEmail").value;
      
      // 🟢 ดึงเลขบรรทัดจากช่องลับมาเตรียมไว้
      let rowNum = document.getElementById("pdfRowNum").value; 
      
      if(!docNo) return alert("Please enter the Document Number.");
      if(isEmailAction && !email) return alert("Please enter a valid email address.");

      let payload = { 
        action: "runPDF", 
        docNo: docNo, 
        email: email,
        isEmailAction: isEmailAction,
        // 🟢 แนบเลขบรรทัดส่งไปให้ code.gs (ถ้าไม่มีค่าให้ส่งไปเป็น 0)
        rowNum: rowNum ? parseInt(rowNum) : 0 
      };
      
      let loadingMessage = isEmailAction ? "SENDING EMAIL..." : "GENERATING PDF...";
      
      sendToAPI(payload, loadingMessage, () => {
        loadOrderList(); 
        
        // 🟢 เคลียร์ค่าหลังทำงานเสร็จ
        document.getElementById("pdfRowNum").value = ""; 
        
        if(!isEmailAction) {
          document.getElementById("pdfDocNo").value = "";
        } else {
          document.getElementById("pdfDocNo").value = "";
          document.getElementById("pdfEmail").value = "";
        }
      });
    }


    function saveCustomer() {
      let payload = {
        action: "saveCustomer", cid: document.getElementById("cId").value, cname: document.getElementById("cName").value,
        caddress: document.getElementById("cAddress").value, ctax: document.getElementById("cTax").value,
        ctype: document.getElementById("cType").value, cemail: document.getElementById("cEmail").value, cphone: document.getElementById("cPhone").value
      };
      
      if(!payload.cname) return alert("กรุณาระบุชื่อลูกค้าหรือชื่อบริษัทด้วยครับ");

      sendToAPI(payload, "SAVING CUSTOMER...", () => {
        document.getElementById("cId").value = "";
        document.getElementById("cName").value = "";
        document.getElementById("cAddress").value = "";
        document.getElementById("cTax").value = "";
        document.getElementById("cEmail").value = "";
        document.getElementById("cPhone").value = "";
        setCustomerType('นามบุคคล'); 
      });
    }

    function loadOrderList() {
      setLoading(true, "LOADING ORDERS...");
      
      fetch(API_URL + "?action=getOrders") 
      .then(res => res.json())
      .then(data => {
        if(data.error) {
          alert("Error หลังบ้าน: " + data.error);
          return;
        }
        data.sort((a, b) => {
          if (a.printed !== b.printed) return a.printed ? 1 : -1; 
          return b.doc.localeCompare(a.doc); 
        });

        let listDiv = document.getElementById("orderList");
        if(data.length === 0) {
           listDiv.innerHTML = `<div class="text-center text-[#726E68] text-xs py-4">No data available</div>`;
           return;
        }

        listDiv.innerHTML = data.map(o => `
            <div class="flex justify-between items-center p-3 bg-[#0A0A0A] rounded-lg border ${o.printed ? 'border-green-900/40 bg-green-950/5' : 'border-red-900/50 bg-red-950/5'} cursor-pointer hover:bg-[#1A1A1A] transition" onclick="document.getElementById('pdfDocNo').value='${o.doc}'; document.getElementById('pdfRowNum').value='${o.rowNum || 0}';">
            <div class="space-y-0.5">
              <div class="text-white font-bold text-sm tracking-wide">${o.doc}</div>
              <div class="text-[11px] text-[#A3A019] font-medium flex items-center gap-1">
                <i class="ph ph-user"></i> Customer: ${o.customer}
              </div>
              <div class="text-[10px] text-[#726E68] flex items-center gap-1">
                <i class="ph ph-calendar-blank"></i> Date: ${o.date}
              </div>
            </div>
            <div class="flex items-center gap-2">
              ${o.url ? `<button onclick="event.stopPropagation(); window.open('${o.url}', '_blank');" class="text-blue-400 hover:text-blue-300 text-xs bg-[#33312F] px-2.5 py-1.5 rounded flex items-center gap-1 transition"><i class="ph ph-eye"></i> View</button>` : ''}
              <span class="${o.printed ? 'text-green-400 bg-green-950/50 border border-green-800/40' : 'text-amber-400 bg-amber-950/50 border border-amber-800/40'} font-medium text-[11px] px-2.5 py-1 rounded tracking-wider">
                ${o.printed ? 'Printed' : 'Pending'}
              </span>
            </div>
          </div>
        `).join('');
      })
      .catch(err => alert("Error: ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการ Deploy หรือเคลียร์แคชเบราว์เซอร์"))
      .finally(() => setLoading(false));
    }

    function setCustomerType(type) {
      const btnPerson = document.getElementById("btnTypePerson");
      const btnCompany = document.getElementById("btnTypeCompany");
      const cTypeInput = document.getElementById("cType");
      
      if(cTypeInput) cTypeInput.value = type;
      
      if (type === 'นามบุคคล') {
        if(btnPerson) btnPerson.className = "flex-1 py-2.5 rounded-md text-xs font-medium bg-[#33312F] text-white border border-[#726E68] transition duration-300";
